{% extends "base.html" %}

{% block content %}
<div class="login-container">
    <!-- Animated Background -->
    <div class="login-background">
        <div class="gradient-sphere sphere-1"></div>
        <div class="gradient-sphere sphere-2"></div>
        <div class="gradient-sphere sphere-3"></div>
    </div>

    <!-- Login Card -->
    <div class="login-card" data-aos="zoom-in" data-aos-duration="1000">
        <div class="login-header">
            <div class="logo-wrapper">
                <i class="bi bi-hospital"></i>
            </div>
            <h1 class="brand-title">MediCare<span>Pro</span></h1>
            <p class="brand-subtitle">Enterprise Healthcare Management System</p>
        </div>

        <form method="POST" class="login-form" id="loginForm">
            <!-- Email Field -->
            <div class="form-group" data-aos="fade-up" data-aos-delay="100">
                <label for="email" class="form-label">
                    <i class="bi bi-envelope"></i>
                    Email Address
                </label>
                <div class="input-wrapper">
                    <input type="email" 
                           id="email" 
                           name="email" 
                           class="form-control" 
                           placeholder="Enter your email"
                           required>
                    <span class="input-icon">
                        <i class="bi bi-envelope"></i>
                    </span>
                </div>
            </div>

            <!-- Password Field -->
            <div class="form-group" data-aos="fade-up" data-aos-delay="200">
                <label for="password" class="form-label">
                    <i class="bi bi-lock"></i>
                    Password
                </label>
                <div class="input-wrapper">
                    <input type="password" 
                           id="password" 
                           name="password" 
                           class="form-control" 
                           placeholder="Enter your password"
                           required>
                    <span class="input-icon">
                        <i class="bi bi-lock"></i>
                    </span>
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <i class="bi bi-eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Remember Me & Forgot Password -->
            <div class="form-options" data-aos="fade-up" data-aos-delay="300">
                <label class="checkbox-container">
                    <input type="checkbox" name="remember">
                    <span class="checkmark"></span>
                    <span class="checkbox-label">Remember me</span>
                </label>
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>

            <!-- Login Button -->
            <button type="submit" class="btn btn-primary btn-lg w-100" id="loginButton" data-aos="fade-up" data-aos-delay="400">
                <i class="bi bi-box-arrow-in-right"></i>
                <span>Access Dashboard</span>
                <div class="button-loader"></div>
            </button>

            <!-- Register Link -->
            <div class="register-section" data-aos="fade-up" data-aos-delay="500">
                <p class="text-secondary">New to MediCare Pro?</p>
                <a href="{{ url_for('auth.register') }}" class="register-link">
                    Create an account
                    <i class="bi bi-arrow-right"></i>
                </a>
            </div>
        </form>

        <!-- Security Badges -->
        <div class="security-badges" data-aos="fade-up" data-aos-delay="600">
            <div class="security-badge">
                <i class="bi bi-shield-check"></i>
                <span>256-bit SSL</span>
            </div>
            <div class="security-badge">
                <i class="bi bi-incognito"></i>
                <span>HIPAA Compliant</span>
            </div>
            <div class="security-badge">
                <i class="bi bi-fingerprint"></i>
                <span>2FA Ready</span>
            </div>
        </div>

        <!-- Version -->
        
    </div>
</div>

<style>
/* Login Page Specific Styles */
.login-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 2rem;
}

.login-background {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 0;
}

.gradient-sphere {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.3;
}

.sphere-1 {
    width: 500px;
    height: 500px;
    background: radial-gradient(circle at 30% 50%, var(--primary-500), transparent 70%);
    top: -100px;
    left: -100px;
    animation: sphereFloat 20s ease-in-out infinite;
}

.sphere-2 {
    width: 600px;
    height: 600px;
    background: radial-gradient(circle at 70% 50%, var(--primary-600), transparent 70%);
    bottom: -150px;
    right: -150px;
    animation: sphereFloat 25s ease-in-out infinite reverse;
}

.sphere-3 {
    width: 400px;
    height: 400px;
    background: radial-gradient(circle at 50% 50%, var(--primary-400), transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: sphereFloat 15s ease-in-out infinite;
}

@keyframes sphereFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(50px, 30px) scale(1.1); }
    50% { transform: translate(-30px, -20px) scale(0.9); }
    75% { transform: translate(-20px, 40px) scale(1.05); }
}

.login-card {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 480px;
    background: rgba(30, 41, 59, 0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-2xl);
    padding: 3rem;
    box-shadow: var(--shadow-xl), var(--shadow-glow);
}

.logo-wrapper {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--primary-600), var(--primary-800));
    border-radius: var(--radius-xl);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    box-shadow: var(--shadow-glow);
    animation: logoPulse 3s ease-in-out infinite;
}

@keyframes logoPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

.logo-wrapper i {
    font-size: 3rem;
    color: white;
}

.brand-title {
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 0.5rem;
    text-align: center;
}

.brand-title span {
    color: var(--primary-500);
}

.brand-subtitle {
    color: var(--text-tertiary);
    text-align: center;
    margin-bottom: 2.5rem;
}

.input-wrapper {
    position: relative;
}

.input-icon {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
}

.form-control {
    padding-left: 3rem;
    height: 50px;
}

.password-toggle {
    position: absolute;
    right: 1rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    transition: var(--transition-base);
}

.password-toggle:hover {
    color: var(--primary-500);
}

.form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
}

.checkbox-container {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    position: relative;
    padding-left: 28px;
}

.checkbox-container input {
    position: absolute;
    opacity: 0;
}

.checkmark {
    position: absolute;
    left: 0;
    width: 18px;
    height: 18px;
    background: var(--bg-input);
    border: 2px solid var(--border-medium);
    border-radius: 4px;
    transition: var(--transition-base);
}

.checkbox-container:hover .checkmark {
    border-color: var(--primary-500);
}

.checkbox-container input:checked ~ .checkmark {
    background: var(--primary-500);
    border-color: var(--primary-500);
}

.checkmark::after {
    content: '';
    position: absolute;
    display: none;
    left: 5px;
    top: 1px;
    width: 4px;
    height: 8px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
}

.checkbox-container input:checked ~ .checkmark::after {
    display: block;
}

.checkbox-label {
    color: var(--text-secondary);
    font-size: 0.875rem;
}

.forgot-link {
    color: var(--text-tertiary);
    text-decoration: none;
    font-size: 0.875rem;
    transition: var(--transition-base);
}

.forgot-link:hover {
    color: var(--primary-500);
}

.register-section {
    text-align: center;
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border-light);
}

.text-secondary {
    color: var(--text-tertiary);
    margin-bottom: 0.5rem;
}

.register-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--primary-500);
    text-decoration: none;
    font-weight: 600;
    transition: var(--transition-base);
}

.register-link:hover {
    gap: 1rem;
    color: var(--primary-400);
}

.security-badges {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border-light);
}

.security-badge {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--text-tertiary);
    font-size: 0.75rem;
}

.security-badge i {
    color: var(--primary-500);
    font-size: 1rem;
}

.version-tag {
    text-align: center;
    margin-top: 1.5rem;
    color: var(--text-muted);
    font-size: 0.75rem;
}

.button-loader {
    display: none;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

.btn.loading .button-text {
    display: none;
}

.btn.loading .button-loader {
    display: inline-block;
}

@media (max-width: 768px) {
    .login-card {
        padding: 2rem;
    }
    
    .brand-title {
        font-size: 2rem;
    }
    
    .security-badges {
        flex-direction: column;
        align-items: center;
        gap: 1rem;
    }
}
</style>

<script>
function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.getElementById('toggleIcon');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('bi-eye');
        toggleIcon.classList.add('bi-eye-slash');
    } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('bi-eye-slash');
        toggleIcon.classList.add('bi-eye');
    }
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
    const button = document.getElementById('loginButton');
    button.classList.add('loading');
});
</script>
{% endblock %}
